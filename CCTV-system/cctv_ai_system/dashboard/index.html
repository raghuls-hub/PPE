<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCTV AI Monitoring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c10;
      --surface:  #12151c;
      --card:     #181c26;
      --border:   #252a38;
      --accent:   #3b82f6;
      --accent2:  #6366f1;
      --success:  #22c55e;
      --danger:   #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.6; transform:scale(1.3); }
    }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .badge {
      font-size: .75rem;
      font-weight: 600;
      background: rgba(59,130,246,.15);
      color: var(--accent);
      border: 1px solid rgba(59,130,246,.3);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── Add Camera Button / Panel ── */
    #toggleBtn {
      display: flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    #toggleBtn:hover { opacity: .88; transform: translateY(-1px); }

    #addPanel {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 28px;
      animation: slideDown .2s ease;
    }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    #addPanel.open { display: block; }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
    .form-group label { font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .form-group input {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 8px;
      font-size: .875rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    #addForm button[type="submit"] {
      background: var(--success);
      color: #fff;
      border: none;
      padding: 9px 20px;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      white-space: nowrap;
    }
    #addForm button[type="submit"]:hover { opacity: .85; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 18px 28px 6px;
      flex-wrap: wrap;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stat-icon { font-size: 1.3rem; }
    .stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .stat-value { font-size: 1.3rem; font-weight: 700; line-height: 1; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 18px;
      padding: 18px 28px 32px;
    }

    /* ── Camera Card ── */
    .camera-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .camera-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
    }

    .cam-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 8px;
    }
    .cam-meta { display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 8px; height: 8px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--success);
      flex-shrink: 0;
    }
    .status-dot.offline { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    .cam-name { font-size: .9rem; font-weight: 600; }
    .cam-location { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    .cam-actions { display: flex; gap: 8px; }
    .btn-icon {
      background: rgba(255,255,255,.06);
      border: none;
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
      font-size: .85rem;
    }
    .btn-icon:hover { background: rgba(239,68,68,.15); color: var(--danger); }

    /* Stream wrapper */
    .stream-wrap {
      position: relative;
      background: #000;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .stream-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .stream-overlay {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(6px);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .08em;
      color: var(--success);
    }
    .stream-overlay.offline-label { color: var(--danger); }

    /* Error / loading state */
    .stream-placeholder {
      width: 100%; aspect-ratio: 16/9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #0d1117;
      color: var(--muted);
      font-size: .85rem;
    }
    .stream-placeholder svg { opacity: .3; }

    /* Camera footer */
    .cam-footer {
      padding: 8px 14px 12px;
      font-size: .72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Empty state */
    #emptyState {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 80px 20px;
      color: var(--muted);
      text-align: center;
    }
    #emptyState svg { opacity: .2; }
    #emptyState p { font-size: .95rem; }
    #emptyState small { font-size: .8rem; opacity: .7; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: .85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-left: 3px solid var(--success); }
    #toast.error   { border-left: 3px solid var(--danger); }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    CCTV AI Monitor
  </div>
  <div class="header-right">
    <span class="badge" id="liveCount">0 Live</span>
    <button id="toggleBtn" onclick="togglePanel()">
      ＋ Add Camera
    </button>
  </div>
</header>

<!-- ── Add Camera Panel ─────────────────────────────────────────────────────── -->
<div id="addPanel">
  <form id="addForm" class="form-row" onsubmit="addCamera(event)">
    <div class="form-group">
      <label>Camera Name</label>
      <input id="camName" type="text" placeholder="e.g. Entrance Gate" required />
    </div>
    <div class="form-group" style="flex:2;">
      <label>Stream URL</label>
      <input id="camUrl" type="url" placeholder="http://192.168.x.x:8080/video" required />
    </div>
    <div class="form-group">
      <label>Location</label>
      <input id="camLocation" type="text" placeholder="e.g. Floor 1" required />
    </div>
    <button type="submit">Add Camera</button>
  </form>
</div>

<!-- ── Stats Bar ────────────────────────────────────────────────────────────── -->
<div class="stats-bar">
  <div class="stat">
    <span class="stat-icon">📹</span>
    <div>
      <div class="stat-label">Total Cameras</div>
      <div class="stat-value" id="totalCameras">0</div>
    </div>
  </div>
  <div class="stat">
    <span class="stat-icon">🟢</span>
    <div>
      <div class="stat-label">Online</div>
      <div class="stat-value" id="onlineCameras" style="color:var(--success)">0</div>
    </div>
  </div>
  <div class="stat">
    <span class="stat-icon">🔴</span>
    <div>
      <div class="stat-label">Offline</div>
      <div class="stat-value" id="offlineCameras" style="color:var(--danger)">0</div>
    </div>
  </div>
</div>

<!-- ── Camera Grid ──────────────────────────────────────────────────────────── -->
<div class="grid" id="cameraGrid"></div>

<!-- ── Empty State ─────────────────────────────────────────────────────────── -->
<div id="emptyState">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
  </svg>
  <p>No cameras added yet</p>
  <small>Click <strong>+ Add Camera</strong> to register your first stream</small>
</div>

<!-- ── Toast ────────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
  const API = "http://127.0.0.1:8000";
  let cameras = [];

  // ── Utility ──────────────────────────────────────────────────────────────
  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = (type === "success" ? "✓  " : "✕  ") + msg;
    t.className = `show ${type}`;
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  function togglePanel() {
    document.getElementById("addPanel").classList.toggle("open");
  }

  // ── Load cameras ─────────────────────────────────────────────────────────
  async function loadCameras() {
    try {
      const res = await fetch(`${API}/cameras`);
      cameras = await res.json();
      renderGrid();
    } catch {
      showToast("Cannot reach backend — is Uvicorn running?", "error");
    }
  }

  // ── Add camera ───────────────────────────────────────────────────────────
  async function addCamera(e) {
    e.preventDefault();
    const payload = {
      name:       document.getElementById("camName").value.trim(),
      stream_url: document.getElementById("camUrl").value.trim(),
      location:   document.getElementById("camLocation").value.trim(),
    };
    try {
      const res = await fetch(`${API}/cameras`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error();
      document.getElementById("addForm").reset();
      document.getElementById("addPanel").classList.remove("open");
      showToast(`"${payload.name}" added successfully`);
      loadCameras();
    } catch {
      showToast("Failed to add camera", "error");
    }
  }

  // ── Delete camera ────────────────────────────────────────────────────────
  async function deleteCamera(id, name) {
    if (!confirm(`Remove camera "${name}"?`)) return;
    try {
      await fetch(`${API}/cameras/${id}`, { method: "DELETE" });
      showToast(`"${name}" removed`);
      loadCameras();
    } catch {
      showToast("Failed to delete camera", "error");
    }
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid   = document.getElementById("cameraGrid");
    const empty  = document.getElementById("emptyState");

    document.getElementById("totalCameras").textContent  = cameras.length;
    document.getElementById("liveCount").textContent     = `${cameras.length} Live`;

    if (cameras.length === 0) {
      grid.innerHTML = "";
      empty.style.display = "flex";
      document.getElementById("onlineCameras").textContent  = 0;
      document.getElementById("offlineCameras").textContent = 0;
      return;
    }

    empty.style.display = "none";
    grid.innerHTML = cameras.map(cam => `
      <div class="camera-card" id="card-${cam.id}">

        <div class="cam-header">
          <div class="cam-meta">
            <div class="status-dot" id="dot-${cam.id}"></div>
            <div>
              <div class="cam-name">${cam.name}</div>
              <div class="cam-location">📍 ${cam.location}</div>
            </div>
          </div>
          <div class="cam-actions">
            <button class="btn-icon" title="Remove camera"
                    onclick="deleteCamera(${cam.id}, '${cam.name.replace(/'/g,"\\'")}')">
              🗑
            </button>
          </div>
        </div>


        <div class="stream-wrap" id="wrap-${cam.id}">
          <iframe
            id="stream-${cam.id}"
            src="${cam.stream_url}"
            title="${cam.name} stream"
            onload="handleStreamLoad(${cam.id})"
            onerror="handleStreamError(${cam.id})"
            style="width: 100%; aspect-ratio: 16/9; border: none; display: block;"
          ></iframe>
          <div class="stream-overlay" id="label-${cam.id}">● LIVE</div>
        </div>


        <div class="cam-footer">
          <span id="url-${cam.id}" style="font-size:.68rem;word-break:break-all;opacity:.6;">${cam.stream_url}</span>
          <span id="age-${cam.id}"></span>
        </div>

      </div>
    `).join("");

    updateStats();
  }

  // ── Stream status callbacks ───────────────────────────────────────────────
  function handleStreamError(id) {
    const dot   = document.getElementById(`dot-${id}`);
    const label = document.getElementById(`label-${id}`);
    if (dot)   { dot.classList.add("offline"); }
    if (label) { label.textContent = "● OFFLINE"; label.classList.add("offline-label"); }
    updateStats();

    // Retry after 10 s
    setTimeout(() => retryStream(id), 10000);
  }

  function handleStreamLoad(id) {
    const dot   = document.getElementById(`dot-${id}`);
    const label = document.getElementById(`label-${id}`);
    if (dot)   { dot.classList.remove("offline"); }
    if (label) { label.textContent = "● LIVE"; label.classList.remove("offline-label"); }
    updateStats();
  }

  function retryStream(id) {
    const img = document.getElementById(`stream-${id}`);
    if (!img) return;
    const cam = cameras.find(c => c.id === id);
    if (!cam) return;
    img.src = cam.stream_url + "?t=" + Date.now();   // cache-bust
  }

  // ── Stats counter ─────────────────────────────────────────────────────────
  function updateStats() {
    const offline = document.querySelectorAll(".status-dot.offline").length;
    const online  = cameras.length - offline;
    document.getElementById("onlineCameras").textContent  = online;
    document.getElementById("offlineCameras").textContent = offline;
    document.getElementById("liveCount").textContent      = `${online} Live`;
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  loadCameras();
  setInterval(loadCameras, 30000);   // refresh camera list every 30 s
</script>
</body>
</html>
